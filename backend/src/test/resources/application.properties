# Database Configuration for Tests (In-memory H2)
spring.datasource.url=jdbc:h2:mem:todo_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate Configuration for Tests
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration for Tests
app.jwt.secret=9a4f2c5d3b6a1e8f7c9d0e2b4a5f6e7c8d9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Mail Configuration for Tests
spring.mail.host=localhost
spring.mail.port=25

# App Base URLs for Tests
app.frontend.url=http://localhost:3000
app.backend.url=http://localhost:8080
