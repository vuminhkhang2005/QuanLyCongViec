# Import environment variables from .env file
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Server configuration
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:todo_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:vmkhang2072005@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ggow zkdo wabq qggj}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT Configuration
app.jwt.secret=${JWT_SECRET:9a4f2c5d3b6a1e8f7c9d0e2b4a5f6e7c8d9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c}
# 15 minutes = 900000 ms
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
# 7 days = 604800000 ms
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# App Base URLs for Redirection and Links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.backend.url=${BACKEND_URL:http://localhost:8080}

# Email Provider Configuration (smtp or google_script)
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.google-script.url=${GOOGLE_SCRIPT_MAIL_URL:}
app.mail.google-script.secret=${GOOGLE_SCRIPT_MAIL_SECRET:}
